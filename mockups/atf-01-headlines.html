<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>01 — Headlines</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Georgia',serif;background:#0e0e0c;color:#e8e0d4;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
.wordmark{position:fixed;top:2rem;left:50%;transform:translateX(-50%);font-size:1.1rem;font-style:italic;color:rgba(232,224,212,0.2)}
.stage{text-align:center;padding:0 4rem;position:relative;height:180px;display:flex;align-items:center;justify-content:center}
.headline{position:absolute;font-size:4.5rem;font-weight:400;letter-spacing:-0.03em;line-height:1.15;opacity:0;transform:translateY(30px);transition:all 0.7s cubic-bezier(0.22,1,0.36,1);max-width:900px}
.headline.active{opacity:1;transform:translateY(0)}
.headline.exiting{opacity:0;transform:translateY(-30px)}
.byline{position:fixed;bottom:3.5rem;left:50%;transform:translateX(-50%);font-size:0.75rem;color:#555;transition:opacity 0.4s ease;text-align:center}
.byline .name{color:#888;font-weight:600}
</style></head><body>
<div class="wordmark">Wikifreedia</div>
<div class="stage">
  <div class="headline active" id="h0">Ivermectin saves lives.<br>They suppressed it for profit.</div>
  <div class="headline" id="h1">Ivermectin has no proven benefit.<br>The trials are clear.</div>
  <div class="headline" id="h2">The system couldn't honestly<br>evaluate Ivermectin.</div>
</div>
<div class="byline" id="byline">— <span class="name" id="who">Joe Rogan</span></div>
<script>
const headlines=[
  {el:document.getElementById('h0'),who:'Joe Rogan'},
  {el:document.getElementById('h1'),who:'Anthony Fauci'},
  {el:document.getElementById('h2'),who:'Bret Weinstein'}
];
let current=0;
function next(){
  headlines[current].el.classList.remove('active');
  headlines[current].el.classList.add('exiting');
  setTimeout(()=>headlines[current].el.classList.remove('exiting'),700);
  current=(current+1)%3;
  headlines[current].el.classList.add('active');
  document.getElementById('who').textContent=headlines[current].who;
}
setInterval(next,3000);
</script></body></html>
